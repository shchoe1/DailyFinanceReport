name: daily-market-briefing

on:
  schedule:
    # UTC 기준. 21:07 UTC(일~목) = 06:07 KST(월~금)
    # 정시(:00)는 GitHub 예약 부하가 몰려 지연·누락이 잦아 일부러 :07로 비켜둠.
    # 만약을 위한 백업: 21:37 UTC(06:37 KST)에도 한 번 더 시도(같은 날 이미 발행됐으면 발송은 건너뜀).
    - cron: "7 21 * * 0-4"
    - cron: "37 21 * * 0-4"
  workflow_dispatch: {}      # 수동 실행 버튼

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report & send KakaoTalk
        env:
          # 클라우드(해외 IP)에서는 카카오가 미전달되므로 텔레그램으로 발송
          SEND_KAKAO: "0"
          SEND_TELEGRAM: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPORT_BASE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          PYTHONUTF8: "1"
        run: python main.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
